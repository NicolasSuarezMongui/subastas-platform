services:
  mysql:
    image: mysql:8.0
    container_name: subasta-mysql
    networks:
      - subasta-network
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: subasta_db
      MYSQL_USER: subasta_user
      MYSQL_PASSWORD: subasta_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --server-id=1 --log-bin=mysql-bin --binlog-format=ROW --binlog-row-image=FULL

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: subasta-redpanda
    networks:
      - subasta-network
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=warn
    ports:
      - "19092:19092"
      - "18082:18082"
      - "18081:18081"
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  redpanda-console:
    image: redpandadata/console:latest
    container_name: subasta-console
    networks:
      - subasta-network
    depends_on:
      - redpanda
    environment:
      KAFKA_BROKERS: "redpanda:9092"
    ports:
      - "8090:8080"

  debezium:
    image: quay.io/debezium/server:2.7
    container_name: subasta-debezium
    networks:
      - subasta-network
    depends_on:
      - redpanda
      - mysql
    volumes:
      - ./config/debezium:/debezium/conf
      - ./config/debezium/data:/debezium/data

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: subasta-clickhouse
    networks:
      - subasta-network
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  grafana:
    image: grafana/grafana:latest
    container_name: subasta-grafana
    networks:
      - subasta-network
    depends_on:
      - clickhouse
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana

networks:
  subasta-network:
    driver: bridge

volumes:
  mysql_data:
  redpanda_data:
  clickhouse_data:
  grafana_data: