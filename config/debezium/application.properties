debezium.sink.type=kafka
debezium.sink.kafka.producer.bootstrap.servers=redpanda:9092
debezium.sink.kafka.producer.key.serializer=org.apache.kafka.common.serialization.StringSerializer
debezium.sink.kafka.producer.value.serializer=org.apache.kafka.common.serialization.StringSerializer

debezium.source.connector.class=io.debezium.connector.mysql.MySqlConnector
debezium.source.tasks.max=1
debezium.source.database.hostname=mysql
debezium.source.database.port=3306
debezium.source.database.user=debezium
debezium.source.database.password=dbz
debezium.source.database.server.id=184054
debezium.source.topic.prefix=dbz
debezium.source.database.include.list=subasta_db
debezium.source.table.include.list=subasta_db.pujas
debezium.source.include.schema.changes=false
debezium.source.snapshot.mode=initial
debezium.source.schema.history.internal=io.debezium.storage.kafka.history.KafkaSchemaHistory
debezium.source.schema.history.internal.kafka.bootstrap.servers=redpanda:9092
debezium.source.schema.history.internal.kafka.topic=schema-history.subasta_db

debezium.source.offset.storage=org.apache.kafka.connect.storage.FileOffsetBackingStore
debezium.source.offset.storage.file.filename=/debezium/data/offsets.dat
debezium.source.offset.flush.interval.ms=60000