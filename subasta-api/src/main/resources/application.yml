spring:
  application:
    name: subasta-api

  datasource:
    url: jdbc:mysql://localhost:3306/subasta_db
    username: subasta_user
    password: subasta_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8080